# CMake 4.0 removed compatibility with cmake_minimum_required(VERSION < 3.5). The SDL2 source
# that the bundled `sdl2-sys` compiles on Windows still declares an older minimum, so its
# configure step is rejected. This env var tells CMake to assume a 3.5 policy floor and configure
# anyway — the documented migration workaround.
#
# Harmless elsewhere: Linux/Pi use the system SDL2 (libsdl2-dev) and never invoke CMake from this
# build, so the variable is simply ignored there.
[env]
CMAKE_POLICY_VERSION_MINIMUM = "3.5"

# Tune codegen for the Pi 5's Cortex-A76 (same CPU the libretro core is built with,
# `-mcpu=cortex-a76`). This lets the FFT, the per-cell trig in the wave layer, and the tight
# glitch/decay loops use the A76's NEON feature set instead of generic aarch64. Gated to the
# Pi target triple, so the Windows/x86 dev build is unaffected. Applies to both a native build
# on the Pi and an aarch64 cross-build.
[target.aarch64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=cortex-a76"]
