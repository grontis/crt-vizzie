<!DOCTYPE html>
<!--
  GRONTIS.IO v1.1 — Audio Reactive ASCII CRT Visualizer

  Serving over HTTP is required for audio file access (not file://).
  To run locally:
    npx serve .                   (Node.js)
    python -m http.server 8080    (Python — or: py -m http.server 8080 on Windows)
  Then open: http://localhost:8080

  Audio: drop an MP3/OGG/WAV onto the window, or press [A] to browse.
         Press [D] to toggle the built-in demo synthesizer.

  Font: VT323 loaded from fonts/VT323-Regular.woff2 (offline-friendly).
  Download: https://fonts.google.com/specimen/VT323 → "Download family"
  Place VT323-Regular.ttf (or .woff2) in fonts/ for offline use.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRONTIS.IO v1.11 [AUDIO TERMINAL]</title>

  <!-- CDN fallback if fonts/VT323-Regular.woff2 is not present locally -->
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'GlassTTY';
      src: url('fonts/Glass_TTY_VT220.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }

    /* Fallback — VT323 from CDN if Glass TTY fails to load */
    @font-face {
      font-family: 'VT323';
      src: url('fonts/VT323-Regular.woff2') format('woff2'),
           url('fonts/VT323-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }

    :root {
      --phosphor-dim: #00460f;
      --phosphor-mid: #00b428;
      --phosphor-bright: #00ff41;
      --bg-dark: #0a0a0a;
      --chrome-height-top: 52px;
      --chrome-height-bottom: 60px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: var(--phosphor-bright);
      font-family: 'Courier New', monospace;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
    }

    /* ── Title Bar ── */
    #title-bar {
      height: var(--chrome-height-top);
      background: linear-gradient(90deg, #000080 0%, #1084d0 60%, #000080 100%);
      display: flex;
      align-items: center;
      padding: 0 8px;
      flex-shrink: 0;
      border-bottom: 2px solid #6ab0f5;
      user-select: none;
    }

    #title-bar .title-icon {
      font-size: 18px;
      margin-right: 8px;
      color: #fff;
    }

    #title-bar .title-text {
      flex: 1;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 1px;
      text-shadow: 0 0 8px rgba(255,255,255,0.7);
    }

    #title-bar .win-btn {
      background: linear-gradient(135deg, #c0c0c0 0%, #808080 100%);
      border: 2px outset #c0c0c0;
      color: #000;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      width: 22px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-left: 3px;
      cursor: default;
    }

    /* ── Canvas Container ── */
    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    #canvas-container canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 2;
      display: block;
    }

    #bg-media {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      object-fit: fill;
      opacity: 0.5;
      display: none;
    }

    #bg-sample {
      display: none;
    }

    #bg-fx-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1 !important;
      display: none;
    }

    /* ── Button Bar ── */
    #button-bar {
      height: var(--chrome-height-bottom);
      background: #1a1a1a;
      border-top: 2px solid #333;
      border-bottom: 2px solid #333;
      display: flex;
      align-items: center;
      padding: 0 6px;
      gap: 4px;
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    #button-bar::-webkit-scrollbar { display: none; }

    .btn-group {
      display: flex;
      gap: 3px;
      align-items: center;
    }

    .btn-sep {
      width: 1px;
      height: 30px;
      background: #444;
      margin: 0 4px;
      flex-shrink: 0;
    }

    .ctrl-btn {
      background: linear-gradient(180deg, #2a2a2a 0%, #111 50%, #1a1a1a 100%);
      border: 2px outset #444;
      color: var(--phosphor-mid);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.5px;
      padding: 4px 8px;
      cursor: pointer;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
      height: 30px;
      display: inline-flex;
      align-items: center;
      transition: color 0.1s;
    }

    .ctrl-btn:hover {
      color: var(--phosphor-bright);
      text-shadow: 0 0 6px var(--phosphor-bright);
      border-color: var(--phosphor-bright);
    }

    .ctrl-btn.active {
      background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 50%, #111 100%);
      border-style: inset;
      color: var(--phosphor-bright);
      text-shadow: 0 0 8px var(--phosphor-bright);
    }

    .ctrl-btn .btn-key {
      color: #666;
      font-size: 9px;
      margin-right: 3px;
    }

    /* ── Status Bar ── */
    #status-bar {
      height: 24px;
      background: #0d0d0d;
      border-top: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      padding: 0 8px;
      flex-shrink: 0;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--phosphor-mid);
      gap: 0;
      overflow: hidden;
    }

    #status-bar .status-item {
      padding: 0 8px;
      border-right: 1px solid #333;
    }

    #status-bar .status-item:last-child {
      border-right: none;
    }

    #status-freq { color: var(--phosphor-bright); }
    #status-bpm  { color: var(--phosphor-bright); }
    #status-mode { color: #fff; font-weight: bold; }
    #status-pho  { color: var(--phosphor-bright); }
    #status-src  { color: var(--phosphor-bright); font-weight: bold; }
    #status-cursor { color: var(--phosphor-bright); animation: blink 1s step-end infinite; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── UI Hidden State ── */
    body.ui-hidden #title-bar,
    body.ui-hidden #button-bar,
    body.ui-hidden #status-bar {
      display: none;
    }

    body.ui-hidden #canvas-container {
      height: 100vh;
    }

    /* ── Scrollbar hide for body ── */
    body::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

  <!-- Title Bar -->
  <div id="title-bar">
    <span class="title-icon">▓</span>
    <span class="title-text">GRONTIS.IO v1.1 [AUDIO TERMINAL]</span>
    <button class="win-btn" tabindex="-1">─</button>
    <button class="win-btn" tabindex="-1">□</button>
    <button class="win-btn" tabindex="-1">✕</button>
  </div>

  <!-- Canvas Area -->
  <div id="canvas-container">
    <!-- Background media element — z-index 1, behind canvas -->
    <img id="bg-media" alt="">
    <!-- FX canvas — pixel pipeline output, shown when BackgroundFX is active -->
    <canvas id="bg-fx-canvas"></canvas>
    <!-- Hidden sampling canvas (populated by background.js) -->
    <canvas id="bg-sample"></canvas>
    <!-- p5.js canvas inserted here by sketch.js — z-index 2 -->
  </div>

  <!-- Button Bar -->
  <div id="button-bar">
    <div class="btn-group" id="mode-buttons">
      <button class="ctrl-btn active" data-mode="0" onclick="switchModeByIndex(0)"><span class="btn-key">[1]</span>FUSION</button>
    </div>
    <div class="btn-sep"></div>
    <div class="btn-group">
      <button class="ctrl-btn" onclick="cyclePhosphor()"><span class="btn-key">[P]</span>PHOSPHOR</button>
      <button class="ctrl-btn" onclick="document.getElementById('audio-file-input').click()"><span class="btn-key">[A]</span>AUDIO FILE</button>
      <input type="file" id="audio-file-input" accept="audio/*" style="display:none" onchange="handleAudioFileInput(this)">
      <button class="ctrl-btn" id="load-bg-btn" onclick="document.getElementById('bg-file-input').click()"><span class="btn-key">[L]</span>LOAD BG</button>
      <input type="file" id="bg-file-input" accept="image/*,video/*" multiple style="display:none" onchange="loadBackgroundFile(this)">
      <button class="ctrl-btn" onclick="toggleBackground()"><span class="btn-key">[B]</span>BKGND</button>
      <button class="ctrl-btn" onclick="bgPrev()"><span class="btn-key">[&lt;]</span>BG PREV</button>
      <button class="ctrl-btn" onclick="bgNext()"><span class="btn-key">[&gt;]</span>BG NEXT</button>
      <button class="ctrl-btn" onclick="toggleScanlines()"><span class="btn-key">[S]</span>SCANLINES</button>
      <button class="ctrl-btn" id="demo-btn" onclick="toggleDemo()"><span class="btn-key">[D]</span>DEMO MODE</button>
      <button class="ctrl-btn" onclick="toggleUI()"><span class="btn-key">[U]</span>UI</button>
      <button class="ctrl-btn" onclick="toggleFullscreen()"><span class="btn-key">[F]</span>FULLSCREEN</button>
    </div>
  </div>

  <!-- Status Bar -->
  <div id="status-bar">
    <span class="status-item" id="status-freq">FREQ: ---Hz</span>
    <span class="status-item" id="status-bpm">BPM: ---</span>
    <span class="status-item" id="status-mode">MODE: BOOT</span>
    <span class="status-item" id="status-pho">PHO: GREEN</span>
    <span class="status-item" id="status-src">[READY]</span>
    <span class="status-item" id="status-fusion" style="display:none;color:var(--phosphor-dim);">[TAB] PARAMS</span>
    <span class="status-item" id="status-snap" style="display:none;color:var(--phosphor-bright);font-weight:bold;"></span>
    <span class="status-item" id="status-bg" style="display:none;color:var(--phosphor-bright);font-weight:bold;"></span>
    <span class="status-item" id="status-cursor">█</span>
  </div>

  <!-- Scripts — load order is critical -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/addons/p5.sound.min.js"></script>
  <script src="config.js"></script>
  <script src="audio.js"></script>
  <script src="background.js"></script>
  <script src="ascii-art.js"></script>
  <script src="fusion-params.js"></script>
  <script src="background-fx.js"></script>
  <script src="modes/fusion.js"></script>
  <script src="fusion-panel.js"></script>
  <script src="fusion-automation.js"></script>
  <script src="hardware-bridge.js"></script>
  <script src="sketch.js"></script><!-- always last -->

</body>
</html>
